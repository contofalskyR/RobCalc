<style>

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.65;}

.brand h1{font-size:17px; font-weight:800; letter-spacing:-.02em;}
.brand h1 span{color:var(--acc);}
.brand p{font-size:12px; color:var(--ink3); margin-top:2px;}
.navsec{font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink3); font-weight:700; margin:16px 10px 6px;}
.navitem{display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:9px; cursor:pointer; font-size:13.5px; color:var(--ink2); border:none; background:none; width:100%; text-align:left; font-family:inherit;}
.navitem:hover{background:var(--bg);}
.navitem.active{background:var(--acc2); color:var(--acc); font-weight:600;}

.navitem.active .navnum{border-color:var(--acc); color:var(--acc); background:var(--acc2);}
.navnum.done{background:var(--ok); border-color:var(--ok); color:#fff;}

.crumb{font-size:12px; color:var(--ink3); font-weight:600; text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px;}

.pagesub{color:var(--ink2); font-size:14.5px; margin-bottom:26px;}

<script>
"use strict";
/* ================= state ================= */
var store = {visited:{}, quizBest:{}, drillsOk:{}, weeks:{}, tab:{}};
try{
  var raw = localStorage.getItem("calcprob_v1");

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function mathify(el){
  if(window.renderMathInElement){
    renderMathInElement(el, {delimiters:[
      {left:"$$", right:"$$", display:true},
      {left:"$", right:"$", display:false}
    ], throwOnError:false});
  }
}
/* answer normalization for drills */
function norm(s){
  return (s||"").toLowerCase().replace(/\s+/g,"").replace(/\*/g,"").replace(/·/g,"")
    .replace(/−/g,"-").replace(/\((\w)\)/g,"$1");
}
function numval(s){
  s = (s||"").trim().replace(/\s+/g,"").replace(/−/g,"-");
  if(/^-?\d+\/-?\d+$/.test(s)){ var p=s.split("/"); return parseFloat(p[0])/parseFloat(p[1]); }
  if(/^-?(\d+\.?\d*|\.\d+)$/.test(s)){ return Number(s); }
  return null; /* reject partial parses like "1/e" or "1x" */
}
function checkAnswer(drill, val){
  var n = norm(val);
  if(!n) return false;
  for(var i=0;i<drill.accept.length;i++){ if(norm(drill.accept[i])===n) return true; }
  if(typeof drill.num === "number"){
    var v = numval(val);
    if(v===null) return false;
    if(Number.isInteger(drill.num)) return v === drill.num;      /* integers: exact */
    return Math.abs(v-drill.num) <= Math.max(0.011, Math.abs(drill.num)*0.005); /* decimals: forgiving rounding */
  }
  return false;
}
</script>

sub:"Functions, exponents, logarithms, e, factorials, and summation notation — the language everything else is written in.",

lesson: R`
<h3>1. Functions</h3>
<p>A <b>function</b> is a rule that takes an input and produces exactly one output. We write $f(x) = x^2$ to mean "the function $f$ takes $x$ and returns $x^2$." So $f(3) = 9$ and $f(-2) = 4$.</p>
<p>Think of it as a machine: number in, number out. In your probability course, functions are everywhere — a <i>probability density function</i> $f(x)$ tells you how likely values near $x$ are, and a <i>cumulative distribution function</i> $F(x)$ tells you the probability of getting a value $\le x$.</p>
<div class="ex"><div class="extag">Example</div>
<p>If $f(x) = 2x + 1$, then $f(0)=1$, $f(5)=11$, and $f(a+1) = 2(a+1)+1 = 2a+3$. You substitute the input <i>everywhere</i> $x$ appears.</p></div>

<h3>2. Exponent rules</h3>
<p>These five rules must be automatic:</p>
<div class="eq">$$x^a \cdot x^b = x^{a+b} \qquad \frac{x^a}{x^b} = x^{a-b} \qquad (x^a)^b = x^{ab}$$</div>
<div class="eq">$$x^{-a} = \frac{1}{x^a} \qquad x^{1/2} = \sqrt{x}$$</div>
<p>Two special cases: $x^0 = 1$ (anything nonzero to the 0 power is 1) and $x^1 = x$.</p>
<div class="ex"><div class="extag">Example</div>
<p>Rewrite $\dfrac{1}{x^3}$ as a power: it's $x^{-3}$. Rewrite $\sqrt{x^5}$: it's $x^{5/2}$. This skill matters because the differentiation rules you'll learn work on <i>powers</i> — so you convert roots and fractions into powers first.</p></div>

<h3>3. The number $e$ and exponential functions</h3>
<p>$e \approx 2.71828$ is a special constant, as fundamental as $\pi$. The function $e^x$ (also written $\exp(x)$) is <b>the</b> most important function in probability. Facts to know:</p>
<ul>
<li>$e^x$ is always positive, for every $x$.</li>
<li>$e^0 = 1$, and $e^{a+b} = e^a e^b$ (normal exponent rules apply).</li>
<li>As $x \to \infty$, $e^x$ blows up; as $x \to -\infty$, $e^x \to 0$. So $e^{-x}$ <i>decays to zero</i> as $x$ grows.</li>
</ul>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>The exponential distribution ($f(x)=\lambda e^{-\lambda x}$), the Poisson distribution ($e^{-\lambda}\lambda^k/k!$), and the normal/bell curve ($e^{-x^2/2}$) are all built from $e$. Half of Ross Chapter 5 is manipulating $e^{-\text{something}}$.</p></div>

<h3>4. Logarithms</h3>
<p>The natural logarithm $\ln(x)$ is the <i>inverse</i> of $e^x$: it answers "$e$ to what power gives $x$?" So $\ln(e^3)=3$ and $e^{\ln 5} = 5$. Key rules:</p>
<div class="eq">$$\ln(ab) = \ln a + \ln b \qquad \ln\!\left(\frac{a}{b}\right) = \ln a - \ln b \qquad \ln(a^k) = k\ln a$$</div>
<p>Also: $\ln(1) = 0$, $\ln(e)=1$, and $\ln(x)$ is only defined for $x > 0$.</p>
<div class="ex"><div class="extag">Example</div>
<p>Solve $e^{-2x} = 0.5$. Take $\ln$ of both sides: $-2x = \ln(0.5) \approx -0.693$, so $x \approx 0.347$. (You'll do exactly this to find medians of exponential random variables.)</p></div>

<h3>5. Factorials and counting</h3>
<p>$n!$ ("n factorial") means $n \times (n-1) \times \cdots \times 2 \times 1$. So $4! = 24$. By convention, $0! = 1$. The <b>binomial coefficient</b></p>
<div class="eq">$$\binom{n}{k} = \frac{n!}{k!\,(n-k)!}$$</div>
<p>counts the number of ways to choose $k$ items from $n$. Example: $\binom{5}{2} = \frac{120}{2\cdot 6} = 10$.</p>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>Your course starts (Sept 2, Chapter 1) with combinatorial analysis — it is built entirely on factorials and $\binom{n}{k}$. This is the one topic you'll need on day one.</p></div>

<h3>6. Summation notation</h3>
<p>$\displaystyle\sum_{k=1}^{n} a_k$ means "add up $a_k$ for $k = 1, 2, \ldots, n$." For example:</p>
<div class="eq">$$\sum_{k=1}^{4} k^2 = 1 + 4 + 9 + 16 = 30$$</div>
<p>The index can start anywhere (often $k=0$ in probability). Two sums you'll see constantly:</p>
<ul>
<li>$\displaystyle\sum_{k=1}^{n} k = \frac{n(n+1)}{2}$ &nbsp;(sum of first $n$ integers)</li>
<li>$\displaystyle\sum_{k=0}^{\infty} x^k = \frac{1}{1-x}$ for $|x|<1$ &nbsp;(geometric series — Module 8 covers this properly)</li>
</ul>
<div class="keybox"><div class="extag">Bottom line</div>
<p>Before moving on you should be able to: rewrite roots/fractions as powers, manipulate $e^x$ and $\ln x$ fluently, compute $\binom{n}{k}$, and unpack a $\Sigma$.</p></div>

id:"m1", title:"Limits", short:"Limits",
sub:"What a function approaches. The concept underneath derivatives, integrals, L'Hôpital, and every limit theorem in Chapter 8.",
week:"Week 2",
lesson: R`
<h3>1. The idea</h3>
<p>The <b>limit</b> of $f(x)$ as $x$ approaches $a$, written $\displaystyle\lim_{x\to a} f(x)$, is the value $f(x)$ gets close to as $x$ gets close to $a$ — regardless of what happens exactly <i>at</i> $a$.</p>
<div class="ex"><div class="extag">Example</div>
<p>$\displaystyle\lim_{x \to 2}\; (3x+1) = 7$. As $x$ sneaks up on 2, the output sneaks up on 7. Here you can just plug in $x=2$ — and for "nice" (continuous) functions, plugging in is always step one.</p></div>

<h3>2. When plugging in fails: the $\frac{0}{0}$ situation</h3>
<p>Consider $\displaystyle\lim_{x\to 3} \frac{x^2-9}{x-3}$. Plugging in gives $\frac{0}{0}$ — <b>undefined, but not a dead end</b>. It means "do more work." Factor:</p>
<div class="eq">$$\frac{x^2-9}{x-3} = \frac{(x-3)(x+3)}{x-3} = x+3 \quad (x \ne 3)$$</div>
<p>So the limit is $3 + 3 = 6$. Near $x=3$ (but not at it), the function <i>is</i> $x+3$, and $x+3 \to 6$.</p>
<div class="warnbox"><b>Key mindset:</b> $\frac{0}{0}$ is called an <i>indeterminate form</i>. It doesn't have one fixed answer — the answer depends on the particular functions racing to zero. Module 4 gives you a power tool (L'Hôpital's rule) for these.</div>

<h3>3. Limits at infinity</h3>
<p>$\displaystyle\lim_{x\to\infty} f(x)$ asks: where does $f$ settle as $x$ grows forever? The essentials:</p>
<ul>
<li>$\displaystyle\lim_{x\to\infty} \frac{1}{x} = 0$, and more generally $\dfrac{c}{x^p} \to 0$ for any power $p>0$.</li>
<li>$\displaystyle\lim_{x\to\infty} e^{-x} = 0$ — exponential decay dies.</li>
<li>$e^x$ beats any power: $\displaystyle\lim_{x\to\infty} \frac{x^{100}}{e^x} = 0$. Exponentials always win the race.</li>
</ul>
<div class="ex"><div class="extag">Example: ratio of polynomials</div>
<p>$\displaystyle\lim_{x\to\infty} \frac{3x^2+5x}{2x^2+7}$. Divide top and bottom by $x^2$ (the highest power): $\dfrac{3 + 5/x}{2 + 7/x^2} \to \dfrac{3+0}{2+0} = \dfrac{3}{2}$. Rule of thumb: same degree → ratio of leading coefficients.</p></div>

<h3>4. A limit that defines $e$</h3>
<div class="eq">$$\lim_{n\to\infty}\left(1 + \frac{x}{n}\right)^{\!n} = e^x$$</div>
<p>Memorize this one. With $x = -\lambda$: $\left(1-\frac{\lambda}{n}\right)^n \to e^{-\lambda}$.</p>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>This limit is <i>exactly</i> how the Poisson distribution arises from the binomial (Ross Ch. 4), and it reappears in Chapter 8's limit theorems. When your professor writes $\left(1-\frac{\lambda}{n}\right)^n \approx e^{-\lambda}$ on the board, this is what's happening.</p></div>

<h3>5. Continuity (the two-sentence version)</h3>
<p>A function is <b>continuous</b> at $a$ if $\lim_{x\to a} f(x) = f(a)$ — no jump, no hole, no blow-up; you can draw it without lifting your pen. Polynomials, $e^x$, $\ln x$ (for $x>0$), and their sums/products/compositions are all continuous, which is why "just plug in" usually works.</p>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>A cumulative distribution function $F(x)$ satisfies $\lim_{x\to-\infty}F(x) = 0$ and $\lim_{x\to\infty}F(x) = 1$ — those are literally limit statements, and Ross uses them from Chapter 4 onward.</p></div>

{
id:"m2", title:"Derivatives I: Concept & Power Rule", short:"Derivatives I",
sub:"The derivative measures how fast a function changes. Here you learn what it means and how to differentiate polynomials.",
week:"Week 3",
lesson: R`
<h3>1. What a derivative is</h3>
<p>The <b>derivative</b> of $f$ at a point measures the <b>instantaneous rate of change</b> — the slope of the graph at that exact point. Notation: $f'(x)$ (say "f prime") or $\dfrac{df}{dx}$. Both mean the same thing.</p>
<p>Formally, it's a limit (this is why we learned limits first):</p>
<div class="eq">$$f'(x) = \lim_{h \to 0} \frac{f(x+h) - f(x)}{h}$$</div>
<p>Read it as: the change in output over the change in input — "rise over run" — as the run $h$ shrinks to zero. Average slope over a tiny interval becomes the exact slope at a point.</p>
<div class="ex"><div class="extag">Example: seeing it once by hand</div>
<p>Let $f(x) = x^2$. Then
$$\frac{f(x+h)-f(x)}{h} = \frac{(x+h)^2 - x^2}{h} = \frac{2xh + h^2}{h} = 2x + h$$
As $h \to 0$ this becomes $2x$. So $(x^2)' = 2x$: at $x=3$ the parabola climbs with slope 6. You'll never need to do this limit computation again — the rules below package it — but it's what "derivative" <i>means</i>.</p></div>

<h3>2. The power rule</h3>
<div class="keybox"><div class="extag">Power rule</div>
<p>$$\frac{d}{dx}\, x^n = n\,x^{n-1} \qquad \text{for any real } n$$</p></div>
<p>Bring the exponent down front, knock the exponent down by one. Examples:</p>
<ul>
<li>$(x^5)' = 5x^4$</li>
<li>$(x)' = 1$ &nbsp;and&nbsp; $(c)' = 0$ for any constant $c$ (a flat line has slope 0)</li>
<li>$(\sqrt{x})' = (x^{1/2})' = \tfrac12 x^{-1/2} = \dfrac{1}{2\sqrt{x}}$</li>
<li>$\left(\dfrac{1}{x}\right)' = (x^{-1})' = -x^{-2} = -\dfrac{1}{x^2}$</li>
</ul>
<p>Those last two show why Module 0's "rewrite as a power" skill matters.</p>

<h3>3. Sums and constant multiples</h3>
<p>Derivatives are taken term by term, and constants ride along:</p>
<div class="eq">$$(f + g)' = f' + g' \qquad (c\,f)' = c\,f'$$</div>
<div class="ex"><div class="extag">Example</div>
<p>$f(x) = 4x^3 - 7x^2 + 2x - 9$. Differentiate each term:
$$f'(x) = 12x^2 - 14x + 2$$
(The $-9$ vanishes — constants have zero slope.)</p></div>

<h3>4. Reading a derivative</h3>
<ul>
<li>$f'(x) > 0$: function is <b>increasing</b> at $x$ (graph going uphill).</li>
<li>$f'(x) < 0$: function is <b>decreasing</b>.</li>
<li>$f'(x) = 0$: momentarily flat — a candidate for a peak or valley (Module 4 uses this to find maxima).</li>
</ul>
<div class="ex"><div class="extag">Example</div>
<p>$f(x) = x^2 - 6x$ has $f'(x) = 2x - 6$, which is zero at $x = 3$, negative before, positive after. So $f$ decreases until $x=3$, bottoms out, then increases: $x=3$ is a minimum.</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>Two big uses in your course: (1) the density is the derivative of the CDF, $f(x) = F'(x)$ — Ross Chapter 5 uses this constantly; (2) finding the most likely value (mode) of a distribution means setting a derivative to zero.</p></div>

{
id:"m3", title:"Derivatives II: e, ln, Product, Quotient & Chain Rule", short:"Derivatives II",
sub:"The rules your syllabus explicitly names: product rule and chain rule, plus the derivatives of e^x and ln x.",
week:"Week 3–4",
lesson: R`
<h3>1. Two derivatives to memorize cold</h3>
<div class="keybox"><div class="extag">Memorize</div>
<p>$$\frac{d}{dx}\,e^x = e^x \qquad\qquad \frac{d}{dx}\,\ln x = \frac{1}{x}$$</p></div>
<p>$e^x$ is the function that is its own derivative — that's what makes $e$ special, and it's why $e$ shows up all over probability. ($\ln x$'s derivative $1/x$ assumes $x>0$.)</p>

<h3>2. Product rule</h3>
<p>The derivative of a product is <b>not</b> the product of derivatives. Instead:</p>
<div class="keybox"><div class="extag">Product rule</div>
<p>$$(f\,g)' = f'\,g + f\,g'$$</p></div>
<p>"Derivative of the first times the second, plus the first times the derivative of the second."</p>
<div class="ex"><div class="extag">Example</div>
<p>$h(x) = x^2 e^x$. Take $f = x^2$, $g = e^x$:
$$h'(x) = 2x\,e^x + x^2 e^x = (2x + x^2)\,e^x$$
Factoring out $e^x$ at the end is a habit worth building — probability answers are usually left in that form.</p></div>

<h3>3. Quotient rule</h3>
<div class="keybox"><div class="extag">Quotient rule</div>
<p>$$\left(\frac{f}{g}\right)' = \frac{f'\,g - f\,g'}{g^2}$$</p></div>
<div class="ex"><div class="extag">Example</div>
<p>$h(x) = \dfrac{x}{x^2+1}$: &nbsp; $h'(x) = \dfrac{1\cdot(x^2+1) - x\cdot 2x}{(x^2+1)^2} = \dfrac{1 - x^2}{(x^2+1)^2}$.</p></div>
<p>Tip: many quotients are easier as products with negative exponents, e.g. $\frac{e^x}{x} = x^{-1}e^x$. Use whichever is cleaner.</p>

<h3>4. Chain rule — the big one</h3>
<p>For a function <i>inside</i> another function (a composition), differentiate the outside, keep the inside, then multiply by the derivative of the inside:</p>
<div class="keybox"><div class="extag">Chain rule</div>
<p>$$\frac{d}{dx}\, f\big(g(x)\big) = f'\big(g(x)\big)\cdot g'(x)$$</p></div>
<p>Mantra: <b>"outside derivative × inside derivative."</b> The three patterns you'll use constantly:</p>
<ul>
<li>$\dfrac{d}{dx}\, e^{g(x)} = e^{g(x)}\cdot g'(x)$ &nbsp;— e.g. $\left(e^{-3x}\right)' = -3e^{-3x}$</li>
<li>$\dfrac{d}{dx}\, [g(x)]^n = n\,[g(x)]^{n-1}\cdot g'(x)$ &nbsp;— e.g. $\left((x^2+1)^5\right)' = 5(x^2+1)^4 \cdot 2x$</li>
<li>$\dfrac{d}{dx}\, \ln g(x) = \dfrac{g'(x)}{g(x)}$ &nbsp;— e.g. $\left(\ln(x^2+1)\right)' = \dfrac{2x}{x^2+1}$</li>
</ul>
<div class="ex"><div class="extag">Worked example: the bell curve</div>
<p>Differentiate $f(x) = e^{-x^2/2}$ (the heart of the normal distribution).</p>
<p>Outside: $e^{(\cdot)}$, whose derivative is itself. Inside: $-x^2/2$, whose derivative is $-x$. So:
$$f'(x) = e^{-x^2/2}\cdot(-x) = -x\,e^{-x^2/2}$$
Note $f'(0) = 0$ and the sign flips from + to − there: the bell curve peaks at $x=0$.</p></div>
<div class="ex"><div class="extag">Worked example: rules combined</div>
<p>Differentiate $h(x) = x\,e^{-\lambda x}$ ($\lambda$ a constant). Product rule with a chain rule inside:
$$h'(x) = 1\cdot e^{-\lambda x} + x\cdot(-\lambda e^{-\lambda x}) = (1 - \lambda x)\,e^{-\lambda x}$$
This exact computation appears when you work with the exponential distribution in Ross Ch. 5.</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>Your syllabus lists "chain rule and product rule" by name. Concretely: differentiating CDFs like $F(x) = 1 - e^{-\lambda x}$ to get densities ($F'(x) = \lambda e^{-\lambda x}$ — chain rule), and working with moment generating functions in Ch. 7 (products and compositions everywhere).</p></div>
<div class="warnbox"><b>Most common beginner error:</b> forgetting the inside derivative. $\left(e^{-2x}\right)'$ is $-2e^{-2x}$, not $e^{-2x}$. Every time you differentiate a composition, ask: "what is the inside, and did I multiply by its derivative?"</div>

sub:"Finding peaks of functions, and the rule your syllabus names for evaluating 0/0 limits.",

<h3>1. Finding maxima and minima</h3>
<p>Recipe for locating the peak or valley of a smooth function:</p>
<ol>
<li>Compute $f'(x)$.</li>
<li>Solve $f'(x) = 0$. Solutions are called <b>critical points</b>.</li>
<li>Classify: if $f'$ goes $+ \to -$ across the point it's a <b>max</b>; $- \to +$ means <b>min</b>. (Equivalently: $f''(x) < 0$ means max, $f''(x) > 0$ means min, where $f''$ is the derivative of $f'$.)</li>
</ol>
<div class="ex"><div class="extag">Worked example</div>
<p>Maximize $f(x) = x e^{-x}$ for $x \ge 0$.</p>
<p>Product + chain rule: $f'(x) = e^{-x} - x e^{-x} = (1-x)e^{-x}$.</p>
<p>Since $e^{-x} > 0$ always, $f'(x) = 0$ exactly when $x = 1$. For $x<1$, $f' > 0$ (rising); for $x>1$, $f' < 0$ (falling). So $x = 1$ is the maximum, with value $f(1) = e^{-1} \approx 0.368$.</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>"Where does this density peak?" (the <b>mode</b>) is a standard question — e.g. the mode of the exponential-related densities in Ch. 5. Later in statistics, maximum likelihood estimation is literally this recipe applied to a likelihood function.</p></div>

<h3>2. L'Hôpital's rule</h3>
<p>From Module 1: plugging into a limit sometimes gives the indeterminate forms $\frac{0}{0}$ or $\frac{\infty}{\infty}$. L'Hôpital's rule says: in that case, differentiate top and bottom <i>separately</i> and try again.</p>
<div class="keybox"><div class="extag">L'Hôpital's rule</div>
<p>If $\displaystyle\lim_{x\to a}\frac{f(x)}{g(x)}$ gives $\frac{0}{0}$ or $\frac{\infty}{\infty}$, then
$$\lim_{x\to a}\frac{f(x)}{g(x)} = \lim_{x\to a}\frac{f'(x)}{g'(x)}$$
(provided the right side exists). $a$ can be a number or $\pm\infty$.</p></div>
<div class="warnbox"><b>Two warnings.</b> (1) Check the form first — using L'Hôpital on a limit that isn't $\frac00$ or $\frac\infty\infty$ gives wrong answers. (2) It's $\frac{f'}{g'}$, top and bottom differentiated separately — <i>not</i> the quotient rule.</div>
<div class="ex"><div class="extag">Example 1</div>
<p>$\displaystyle\lim_{x\to 0}\frac{e^x - 1}{x}$. Form: $\frac{0}{0}$. ✓ Differentiate top and bottom: $\dfrac{e^x}{1} \to e^0 = 1$.</p></div>
<div class="ex"><div class="extag">Example 2: repeat if needed</div>
<p>$\displaystyle\lim_{x\to\infty}\frac{x^2}{e^x}$. Form: $\frac{\infty}{\infty}$. ✓ L'Hôpital: $\dfrac{2x}{e^x}$ — still $\frac{\infty}{\infty}$. Apply again: $\dfrac{2}{e^x} \to 0$.</p>
<p>This proves Module 1's slogan: <b>exponentials beat polynomials</b>. Any $\frac{x^n}{e^x} \to 0$; you just apply the rule $n$ times.</p></div>
<div class="ex"><div class="extag">Example 3: products in disguise</div>
<p>$\displaystyle\lim_{x\to\infty} x e^{-x}$ has the form $\infty \cdot 0$. Rewrite as a fraction first: $x e^{-x} = \dfrac{x}{e^x}$, which is $\frac{\infty}{\infty}$, then L'Hôpital gives $\dfrac{1}{e^x} \to 0$.</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>Tail behavior. Showing $x\,e^{-\lambda x} \to 0$ or $x^2 e^{-x^2/2} \to 0$ as $x \to \infty$ is exactly what makes expected values of exponential and normal random variables finite (Ch. 5 and 7), and these limits show up when integration by parts leaves you a "boundary term" to evaluate.</p></div>

{
id:"m5", title:"Integrals I: Antiderivatives & the Fundamental Theorem", short:"Integrals I",
sub:"Integration reverses differentiation and computes area under curves — which in probability means computing probabilities.",
week:"Week 5",
lesson: R`
<h3>1. The two faces of the integral</h3>
<p><b>Face 1 — area:</b> the definite integral $\displaystyle\int_a^b f(x)\,dx$ is the area between the graph of $f$ and the $x$-axis, from $x=a$ to $x=b$.</p>
<p><b>Face 2 — anti-derivative:</b> an <b>antiderivative</b> of $f$ is a function $F$ whose derivative is $f$ (i.e. $F' = f$). We write the general antiderivative as the <i>indefinite</i> integral $\int f(x)\,dx = F(x) + C$. The $+C$ is there because adding any constant doesn't change the derivative.</p>
<p>The miracle that connects them:</p>
<div class="keybox"><div class="extag">Fundamental Theorem of Calculus</div>
<p>$$\int_a^b f(x)\,dx = F(b) - F(a) \qquad \text{where } F' = f$$</p>
<p>Area under a curve = antiderivative at the top limit minus antiderivative at the bottom limit. Notation: $F(b)-F(a)$ is often written $\Big[F(x)\Big]_a^b$.</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>For a continuous random variable with density $f$:
$$P(a \le X \le b) = \int_a^b f(x)\,dx$$
Probability <i>is</i> area under the density curve. And the CDF is $F(x) = \int_{-\infty}^x f(t)\,dt$, which is why $F' = f$. This single idea is the backbone of Ross Chapters 5–7.</p></div>

<h3>2. Basic antiderivatives</h3>
<p>Read your derivative table backwards:</p>
<div class="eq">$$\int x^n\,dx = \frac{x^{n+1}}{n+1} + C \quad (n \neq -1) \qquad \int \frac{1}{x}\,dx = \ln|x| + C$$</div>
<div class="eq">$$\int e^x\,dx = e^x + C \qquad \int e^{kx}\,dx = \frac{1}{k}e^{kx} + C \qquad \int c\,dx = cx + C$$</div>
<p>The power rule in reverse: raise the exponent by one, divide by the new exponent. Check any antiderivative by differentiating it — you should recover the integrand. <i>Always do this check; it's free.</i></p>
<div class="ex"><div class="extag">Example</div>
<p>$\displaystyle\int (6x^2 - 4x + 1)\,dx = 2x^3 - 2x^2 + x + C$. &nbsp;Check: $(2x^3 - 2x^2 + x)' = 6x^2 - 4x + 1$. ✓</p></div>

<h3>3. Computing definite integrals</h3>
<div class="ex"><div class="extag">Worked example</div>
<p>$\displaystyle\int_1^3 x^2\,dx$. Antiderivative: $\frac{x^3}{3}$. Evaluate:
$$\Big[\tfrac{x^3}{3}\Big]_1^3 = \frac{27}{3} - \frac{1}{3} = \frac{26}{3}$$
(No $+C$ needed for definite integrals — it cancels in the subtraction.)</p></div>
<div class="ex"><div class="extag">Worked example with $e$</div>
<p>$\displaystyle\int_0^1 e^{2x}\,dx = \Big[\tfrac12 e^{2x}\Big]_0^1 = \tfrac12 e^2 - \tfrac12 = \tfrac{e^2 - 1}{2} \approx 3.19$.</p></div>

<h3>4. Useful properties</h3>
<ul>
<li>Split sums: $\int (f + g) = \int f + \int g$; constants pull out: $\int c f = c\int f$.</li>
<li>Split ranges: $\int_a^b + \int_b^c = \int_a^c$ &nbsp;(used to break probabilities into pieces).</li>
<li>Zero width: $\int_a^a f = 0$ &nbsp;(in probability: $P(X = a) = 0$ for continuous $X$ — a fact Ross emphasizes).</li>
</ul>
<div class="ex"><div class="extag">A first probability computation</div>
<p>Let $f(x) = 2x$ on $[0,1]$ (a legitimate density: it's $\ge 0$ and $\int_0^1 2x\,dx = [x^2]_0^1 = 1$ ✓). Then
$$P\left(X \le \tfrac12\right) = \int_0^{1/2} 2x\,dx = \Big[x^2\Big]_0^{1/2} = \tfrac14$$
You just did Ross Chapter 5, Example 1, essentially.</p></div>
`,

id:"m6", title:"Integrals II: Substitution, By Parts & Improper Integrals", short:"Integrals II",
sub:"The two integration techniques your syllabus names, plus integrals to infinity — the bread and butter of continuous probability.",
week:"Week 6",
lesson: R`
<h3>1. Substitution (the chain rule, reversed)</h3>
<p>When the integrand contains a function <i>and</i> its derivative, substitute $u$ for the inner function:</p>
<ol>
<li>Choose $u = g(x)$ (usually the "inside"). Compute $du = g'(x)\,dx$.</li>
<li>Rewrite the whole integral in terms of $u$ and $du$ — no $x$ may remain.</li>
<li>Integrate in $u$, then substitute back (or convert the limits and never go back).</li>
</ol>
<div class="ex"><div class="extag">Worked example</div>
<p>$\displaystyle\int 2x\,e^{x^2}\,dx$. Let $u = x^2$, so $du = 2x\,dx$. The integral becomes
$$\int e^u\,du = e^u + C = e^{x^2} + C$$
Check by differentiating (chain rule!): $(e^{x^2})' = 2x e^{x^2}$ ✓.</p></div>
<div class="ex"><div class="extag">Worked example with limits — a probability classic</div>
<p>$\displaystyle\int_0^2 \lambda e^{-\lambda x}\,dx$ with $\lambda = 3$: compute $\int_0^2 3e^{-3x} dx$. Let $u = -3x$, $du = -3dx$, or just use the known antiderivative $-e^{-3x}$:
$$\Big[-e^{-3x}\Big]_0^2 = -e^{-6} - (-e^{0}) = 1 - e^{-6} \approx 0.9975$$
That is $P(X \le 2)$ for an exponential random variable with rate 3.</p></div>

<h3>2. Integration by parts (the product rule, reversed)</h3>
<div class="keybox"><div class="extag">Integration by parts</div>
<p>$$\int u\,dv = uv - \int v\,du$$</p></div>
<p>Use it for products of "different species," classically $\int x e^{x} dx$ or $\int x \ln x\, dx$. Strategy: pick $u$ = the part that gets <i>simpler</i> when differentiated (usually the polynomial), $dv$ = the rest (something you can integrate).</p>
<div class="ex"><div class="extag">Worked example — THE probability integral</div>
<p>$\displaystyle\int x e^{-x}\,dx$. Pick $u = x$ (differentiates to 1 — simpler ✓) and $dv = e^{-x}dx$ (so $v = -e^{-x}$).
$$\int x e^{-x} dx = x\cdot(-e^{-x}) - \int (-e^{-x})\cdot 1\,dx = -xe^{-x} - e^{-x} + C$$
Check: $\left(-xe^{-x} - e^{-x}\right)' = -e^{-x} + xe^{-x} + e^{-x} = xe^{-x}$ ✓</p></div>
<div class="ex"><div class="extag">Worked example</div>
<p>$\displaystyle\int_1^e \ln x\,dx$. Trick: $u = \ln x$, $dv = dx$, so $du = \frac1x dx$, $v = x$:
$$\Big[x\ln x\Big]_1^e - \int_1^e x\cdot\frac1x\,dx = (e - 0) - (e - 1) = 1$$</p></div>

<h3>3. Improper integrals: integrating to infinity</h3>
<p>Probability lives on $[0,\infty)$ and $(-\infty,\infty)$, so you must integrate over infinite ranges. Definition: integrate to a finite $b$, then let $b \to \infty$:</p>
<div class="eq">$$\int_0^\infty f(x)\,dx = \lim_{b\to\infty}\int_0^b f(x)\,dx$$</div>
<p>In practice: find the antiderivative, plug in $\infty$ "in the limit sense" (using Module 1 & 4 facts like $e^{-b} \to 0$ and $be^{-b} \to 0$), and subtract.</p>
<div class="ex"><div class="extag">The most important integral in the course</div>
<p>$$\int_0^\infty \lambda e^{-\lambda x}\,dx = \Big[-e^{-\lambda x}\Big]_0^\infty = \underbrace{0}_{e^{-\infty}} - (-1) = 1$$
The exponential density integrates to 1 — it's a real probability distribution.</p></div>
<div class="ex"><div class="extag">By parts + improper together: an expected value</div>
<p>$$\int_0^\infty x e^{-x}\,dx = \Big[-xe^{-x} - e^{-x}\Big]_0^\infty = \big(0 - 0\big) - \big(0 - 1\big) = 1$$
(The boundary terms at $\infty$ die because $xe^{-x}\to 0$ — that's L'Hôpital from Module 4 earning its keep.) In Ross's language: the expected value of an exponential(1) random variable is 1. This one computation combines <i>everything</i>: by parts, improper integrals, and L'Hôpital.</p></div>
<div class="warnbox"><b>Common errors:</b> (1) In substitution, forgetting to convert $dx$ to $du$. (2) In by parts, integrating both pieces instead of differentiating one. (3) At $\infty$, writing $e^{-\infty} = -\infty$ — no: $e^{-x} \to 0$.</div>

id:"m7", title:"Infinite Series: Geometric & the e^x Series", short:"Series",
sub:"Not on the official prereq list, but Ross uses these constantly for discrete distributions. Thirty minutes here saves hours in Chapter 4.",

lesson: R`
<h3>1. What an infinite series is</h3>
<p>An infinite series $\displaystyle\sum_{k=0}^{\infty} a_k$ is the limit of adding more and more terms. If the running total settles at a finite number, the series <b>converges</b> to it.</p>

<h3>2. The geometric series — the workhorse</h3>
<div class="keybox"><div class="extag">Geometric series</div>
<p>For $|r| < 1$:
$$\sum_{k=0}^{\infty} r^k = 1 + r + r^2 + r^3 + \cdots = \frac{1}{1-r}$$
Starting from $k=1$ instead: $\displaystyle\sum_{k=1}^{\infty} r^k = \frac{r}{1-r}$. Finite version: $\displaystyle\sum_{k=0}^{n} r^k = \frac{1-r^{n+1}}{1-r}$.</p></div>
<div class="ex"><div class="extag">Example</div>
<p>$\displaystyle\sum_{k=0}^\infty \left(\tfrac12\right)^k = \frac{1}{1 - 1/2} = 2$. &nbsp;(1 + ½ + ¼ + ⅛ + ⋯ = 2.)</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>The geometric random variable (number of coin flips until the first head) has $P(X = k) = (1-p)^{k-1}p$. Checking these sum to 1 <i>is</i> a geometric series:
$$\sum_{k=1}^\infty (1-p)^{k-1} p = p\cdot\frac{1}{1-(1-p)} = \frac{p}{p} = 1 \checkmark$$</p></div>

<h3>3. The differentiation trick</h3>
<p>Differentiate both sides of the geometric series with respect to $r$ (term by term on the left):</p>
<div class="eq">$$\sum_{k=1}^{\infty} k\,r^{k-1} = \frac{1}{(1-r)^2} \qquad |r|<1$$</div>
<p>This is how Ross computes the <b>expected value of a geometric random variable</b> ($E[X] = 1/p$) in one line. When you see that derivation in Ch. 4, this is the machinery.</p>

<h3>4. The exponential series</h3>
<div class="keybox"><div class="extag">The $e^x$ series</div>
<p>$$e^x = \sum_{k=0}^{\infty} \frac{x^k}{k!} = 1 + x + \frac{x^2}{2!} + \frac{x^3}{3!} + \cdots \qquad \text{(all } x\text{)}$$</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>The Poisson distribution has $P(X = k) = e^{-\lambda}\dfrac{\lambda^k}{k!}$. Do these sum to 1?
$$\sum_{k=0}^\infty e^{-\lambda}\frac{\lambda^k}{k!} = e^{-\lambda}\sum_{k=0}^\infty \frac{\lambda^k}{k!} = e^{-\lambda}\cdot e^{\lambda} = 1 \checkmark$$
That one-line argument appears on probability exams everywhere. Know the $e^x$ series and it's free points.</p></div>

<h3>5. Small-$x$ approximations (Ch. 8 preview)</h3>
<p>Chopping series after a term or two gives approximations that Ross uses in limit theorems:</p>
<ul>
<li>$e^x \approx 1 + x$ for small $x$ &nbsp;(equivalently $\ln(1+x) \approx x$)</li>
<li>This is why $\left(1 - \frac{\lambda}{n}\right)^n \to e^{-\lambda}$: take logs, $n\ln(1-\tfrac{\lambda}{n}) \approx n\cdot(-\tfrac{\lambda}{n}) = -\lambda$.</li>
</ul>

<h3>1. Functions of two variables</h3>
<p>$f(x,y)$ takes <i>two</i> inputs and returns one number, e.g. $f(x,y) = x^2 y + e^{x+y}$. Its graph is a surface over the $xy$-plane. In probability, a <b>joint density</b> $f(x,y)$ describes two random variables at once — e.g. height and weight of a random person.</p>

<h3>2. Partial derivatives</h3>
<p>The partial derivative $\dfrac{\partial f}{\partial x}$ means: <b>differentiate with respect to $x$, treating $y$ as a constant</b> (and vice versa). That's the entire rule — every technique from Modules 2–3 applies unchanged.</p>
<div class="ex"><div class="extag">Worked example</div>
<p>$f(x,y) = x^3 y^2 + 4y$.</p>
<p>$\dfrac{\partial f}{\partial x} = 3x^2 y^2$ &nbsp;($y^2$ is a constant coefficient; $4y$ is a constant, deriv. 0)</p>
<p>$\dfrac{\partial f}{\partial y} = 2x^3 y + 4$ &nbsp;($x^3$ is now the constant coefficient)</p></div>
<div class="ex"><div class="extag">Worked example with $e$</div>
<p>$f(x,y) = e^{-x-2y}$: &nbsp; $\dfrac{\partial f}{\partial x} = -e^{-x-2y}$, &nbsp; $\dfrac{\partial f}{\partial y} = -2e^{-x-2y}$ (chain rule on each).</p></div>
<div class="prob"><div class="extag">Why this matters for probability</div>
<p>The joint CDF and joint density are linked by $f(x,y) = \dfrac{\partial^2}{\partial x\,\partial y} F(x,y)$ — differentiate once in each variable. This is the two-variable version of $F' = f$, and Ross Ch. 6 states it early.</p></div>

<h3>3. Double integrals</h3>
<p>$\displaystyle\iint_A f(x,y)\,dA$ is the <b>volume</b> under the surface $f$ over the region $A$. You compute it as an <b>iterated integral</b> — integrate in one variable at a time, inside out:</p>
<div class="eq">$$\int_c^d\!\!\int_a^b f(x,y)\,dx\,dy \;=\; \int_c^d \left(\underbrace{\int_a^b f(x,y)\,dx}_{\text{treat } y \text{ as constant}}\right) dy$$</div>
<div class="ex"><div class="extag">Worked example (rectangle)</div>
<p>$\displaystyle\int_0^1\!\!\int_0^2 xy\,dx\,dy$.</p>
<p><b>Inner</b> (in $x$, with $y$ constant): $\displaystyle\int_0^2 xy\,dx = y\Big[\tfrac{x^2}{2}\Big]_0^2 = 2y$.</p>
<p><b>Outer</b>: $\displaystyle\int_0^1 2y\,dy = \Big[y^2\Big]_0^1 = 1$.</p></div>
<div class="ex"><div class="extag">Worked example (a real joint density)</div>
<p>Let $f(x,y) = e^{-x-y}$ for $x \ge 0, y \ge 0$. Check total probability:
$$\int_0^\infty\!\!\int_0^\infty e^{-x}e^{-y}\,dx\,dy = \left(\int_0^\infty e^{-x}dx\right)\!\left(\int_0^\infty e^{-y}dy\right) = 1 \cdot 1 = 1 \checkmark$$
When the integrand factors and the region is a rectangle, the double integral is just a product of single integrals — in probability language, that's <b>independence</b>.</p></div>
<div class="ex"><div class="extag">Non-rectangular region (the classic exam upgrade)</div>
<p>Compute $P(X < Y)$ for that same density — the region is $0 \le x < y < \infty$, a triangle. Make the <i>inner</i> limits depend on the outer variable:
$$\int_0^\infty\!\!\int_0^y e^{-x}e^{-y}\,dx\,dy = \int_0^\infty e^{-y}\Big[-e^{-x}\Big]_0^y dy = \int_0^\infty e^{-y}(1 - e^{-y})\,dy$$
$$= \int_0^\infty (e^{-y} - e^{-2y})\,dy = 1 - \tfrac12 = \tfrac12$$
Which makes sense: by symmetry, $X < Y$ half the time. Being able to set up limits like $\int_0^\infty\int_0^y$ is the #1 skill for Ross Ch. 6.</p></div>
<div class="warnbox"><b>Key habit:</b> before integrating, sketch the region. Decide which variable is inner, and whether its limits are constants or depend on the outer variable. Most Ch. 6 mistakes are wrong limits, not wrong antiderivatives.</div>

id:"m9", title:"Capstone: The Calculus of Probability", short:"Capstone",
sub:"Everything assembled into the exact moves your course will ask for: densities, CDFs, expected values, and normalizing constants.",
week:"Week 8",
lesson: R`
<h3>The five moves</h3>
<p>Continuous probability (Ross Ch. 5–7) is built from five calculus moves. You now know all of them — this module drills the assembly.</p>

<h3>Move 1: Verify a density / find the normalizing constant</h3>
<p>A function $f \ge 0$ is a valid density iff $\int_{-\infty}^{\infty} f(x)\,dx = 1$. Often you're given $f(x) = c\,g(x)$ and asked to <b>find $c$</b>: compute $\int g$ and set $c = 1/\int g$.</p>
<div class="ex"><div class="extag">Worked example</div>
<p>$f(x) = c\,x^2$ on $[0,2]$ (zero elsewhere). Then $\int_0^2 x^2 dx = \frac{8}{3}$, so $c = \frac{3}{8}$.</p></div>

<h3>Move 2: Density ↔ CDF</h3>
<div class="eq">$$F(x) = \int_{-\infty}^{x} f(t)\,dt \qquad\qquad f(x) = F'(x)$$</div>
<p>Integrate the density to get the CDF; differentiate the CDF to get the density. Then $P(a \le X \le b) = F(b) - F(a)$.</p>
<div class="ex"><div class="extag">Worked example</div>
<p>Exponential($\lambda$): $f(x) = \lambda e^{-\lambda x}$, $x \ge 0$. For $x\ge0$:
$$F(x) = \int_0^x \lambda e^{-\lambda t}\,dt = \Big[-e^{-\lambda t}\Big]_0^x = 1 - e^{-\lambda x}$$
And differentiating back (chain rule): $F'(x) = \lambda e^{-\lambda x}$ ✓. Memorize this pair — it is <i>the</i> recurring example of the whole course.</p></div>

<h3>Move 3: Expected value and variance</h3>
<div class="eq">$$E[X] = \int_{-\infty}^{\infty} x\,f(x)\,dx \qquad E[X^2] = \int_{-\infty}^{\infty} x^2 f(x)\,dx$$</div>
<div class="eq">$$\mathrm{Var}(X) = E[X^2] - \big(E[X]\big)^2$$</div>
<p>These integrals typically need <b>by parts</b> (Module 6). Discrete versions swap $\int$ for $\Sigma$ and need <b>series</b> (Module 7).</p>
<div class="ex"><div class="extag">Worked example</div>
<p>$f(x) = 2x$ on $[0,1]$:
$$E[X] = \int_0^1 x\cdot 2x\,dx = \int_0^1 2x^2 dx = \tfrac{2}{3}$$
$$E[X^2] = \int_0^1 2x^3 dx = \tfrac12 \qquad \mathrm{Var}(X) = \tfrac12 - \tfrac49 = \tfrac{1}{18}$$</p></div>

<h3>Move 4: Joint densities (two variables)</h3>
<p>Everything above, with double integrals (Module 8): total probability $\iint f = 1$, probabilities of regions, and <b>marginals</b>:</p>
<div class="eq">$$f_X(x) = \int_{-\infty}^{\infty} f(x,y)\,dy$$</div>
<p>("Integrate out" the variable you don't care about.)</p>
<div class="ex"><div class="extag">Worked example</div>
<p>$f(x,y) = x + y$ on the unit square. Marginal of $X$:
$$f_X(x) = \int_0^1 (x+y)\,dy = \Big[xy + \tfrac{y^2}{2}\Big]_0^1 = x + \tfrac12,\quad 0\le x\le 1$$</p></div>

<h3>Move 5: Limits for the endgame</h3>
<p>Chapter 8 (limit theorems) leans on Module 1 and 4: $\left(1 + \frac{x}{n}\right)^n \to e^x$, L'Hôpital for indeterminate forms, and tail limits like $x e^{-x} \to 0$.</p>

<div class="prob"><div class="extag">You are ready when…</div>
<p>You can do all of these without notes: differentiate $e^{-x^2/2}$ (chain) and $xe^{-\lambda x}$ (product+chain) • integrate $\int_0^\infty x e^{-x} dx$ (parts + improper) • find $c$ so that $c\,g(x)$ is a density • get a CDF from a density and back • evaluate $\int_0^1\!\int_0^y dx\,dy$-style iterated integrals • sum a geometric series and recognize the $e^x$ series. The final quiz below tests exactly this list.</p></div>

{q:R`Find $c$ so $f(x) = c\,e^{-3x}$ on $[0,\infty)$ is a density.`, accept:["3"], num:3, hint:"∫e^(−3x) = 1/3.", sol:R`$\int_0^\infty e^{-3x}dx = \tfrac13$, so $c = 3$ — giving the exponential(3) density.`},

{q:R`$X$ exponential with $\lambda = 2$: $F(x) = 1 - e^{-2x}$. Compute $P(X > 1)$ as a decimal (3 places) or in terms of e.`, accept:["e^(-2)","e^-2"], num:0.1353, hint:"1 − F(1).", sol:R`$P(X>1) = e^{-2} \approx 0.135$.`},

{q:R`Using $E[X] = \tfrac34$ and $E[X^2] = \tfrac35$ for that density: $\mathrm{Var}(X)$? (fraction or decimal, 4 places)`, accept:["3/80","0.0375"], num:0.0375, hint:"E[X²] − (E[X])².", sol:R`$\tfrac35 - \tfrac{9}{16} = \tfrac{48-45}{80} = \tfrac{3}{80} = 0.0375$.`},

  PLAN.forEach(function(w, i){
    var isCurrent = now >= ranges[i][0] && now < ranges[i][1];
    var mods = w.mods.map(function(mi){
      return '<button class="btn ghost small" data-page="' + MODULES[mi].id + '" style="margin:6px 6px 0 0;">Open: ' + MODULES[mi].short + '</button>';
    }).join("");
    var checked = store.weeks[w.id] ? "checked" : "";
    h += '<div class="week' + (isCurrent ? " current" : "") + '">' +
      '<div class="wknum">' + w.label + '<small>' + w.dates + '</small></div>' +
      '<div class="wkbody"><h4>' + w.title + (isCurrent ? ' <span class="chip part">This week</span>' : '') + '</h4><p>' + w.desc + '</p>' + mods +
      '<label class="wkcheck"><input type="checkbox" data-week="' + w.id + '" ' + checked + '> Week completed</label></div></div>';
  });
  mainEl.innerHTML = h;
  mainEl.querySelectorAll("input[data-week]").forEach(function(cb){
    cb.addEventListener("change", function(){ store.weeks[cb.getAttribute("data-week")] = cb.checked; save(); });
  });
  mainEl.querySelectorAll("button[data-page]").forEach(function(b){
    b.addEventListener("click", function(){ go(b.getAttribute("data-page")); });
  });
}

/* ---------- reference ---------- */
function renderRef(){
  var h = '<div class="crumb">Reference</div><h2 class="pagetitle">Formula Sheet</h2>' +
    '<p class="pagesub">Everything on one page. Your exams allow a one-page cram sheet (front and back) — practice condensing this into your own handwriting.</p>' +
    '<button class="btn printbtn" onclick="window.print()">Print / Save as PDF</button>' +
    '<div class="refgrid">';
  REFERENCE.forEach(function(sec){
    h += '<div class="refcard"><h4>' + sec.h + '</h4>';
    sec.lines.forEach(function(l){ h += '<div class="rline">' + l + '</div>'; });
    h += '</div>';
  });
  h += '</div>';
  mainEl.innerHTML = h;
  mathify(mainEl);
}

/* ---------- module ---------- */
function renderModule(idx){
  var m = MODULES[idx];
  store.visited[m.id] = true; save();
  var tab = store.tab[m.id] || "lesson";
  var h = '<div class="crumb">Module ' + (idx+1) + ' of ' + MODULES.length + ' · ' + m.week + '</div>' +
    '<h2 class="pagetitle">' + m.title + '</h2><p class="pagesub">' + m.sub + '</p>';
  h += '<div class="mtabs">' +
    mtab(m, "lesson", "Lesson", tab) +
    mtab(m, "videos", "Videos <span class=cnt>(" + (VIDEOS[m.id]||[]).length + ")</span>", tab) +
    mtab(m, "quiz", "Quiz <span class=cnt>(" + m.quiz.length + ")</span>", tab) +
    mtab(m, "drills", "Practice <span class=cnt>(" + drillCount(m) + "/" + m.drills.length + ")</span>", tab) +
    '</div>';
  h += '<div id="modbody"></div>';
  h += '<div class="next">' +
    (idx > 0 ? '<button class="btn ghost" data-page="' + MODULES[idx-1].id + '">← ' + MODULES[idx-1].short + '</button>' : '<span></span>') +
    (idx < MODULES.length-1 ? '<button class="btn" data-page="' + MODULES[idx+1].id + '">Next: ' + MODULES[idx+1].short + ' →</button>' : '<button class="btn" data-page="home">Finish → Dashboard</button>') +
    '</div>';
  mainEl.innerHTML = h;
  mainEl.querySelectorAll(".mtab").forEach(function(b){
    b.addEventListener("click", function(){ store.tab[m.id] = b.getAttribute("data-tab"); save(); renderModule(idx); });
  });
  mainEl.querySelectorAll(".next button").forEach(function(b){
    b.addEventListener("click", function(){ go(b.getAttribute("data-page")); });
  });
  var body = document.getElementById("modbody");
  if(tab === "lesson"){ body.innerHTML = '<div class="card lesson">' + m.lesson + '</div>'; }
  else if(tab === "videos"){ renderVideosTab(m, body); }
  else if(tab === "quiz"){ renderQuiz(m, body); }
  else { renderDrills(m, body); }
  mathify(body);
}
function mtab(m, id, label, active){
  return '<button class="mtab' + (active === id ? " active" : "") + '" data-tab="' + id + '">' + label + '</button>';
}

/* ---------- quiz ---------- */
function renderQuiz(m, body){
  var best = quizPct(m);
  var h = '<div class="card"><p style="font-size:14px;color:var(--ink2);margin-bottom:18px;">Answer every question. <b>80% or higher</b> marks this module as mastered. Best so far: <b>' + best + '%</b>. You can retake it as many times as you like.</p>';
  m.quiz.forEach(function(q, qi){
    h += '<div class="qq" data-q="' + qi + '"><div class="qtext">' + (qi+1) + '. ' + q.q + '</div><div class="opts">';
    q.opts.forEach(function(o, oi){
      h += '<button class="opt" data-o="' + oi + '">' + o + '</button>';
    });
    h += '</div><div class="expl">' + q.expl + '</div></div>';
  });
  h += '<div class="quizfoot"><span class="score" id="qscore"></span><button class="btn ghost small" id="qreset">Reset quiz</button></div></div>';
  body.innerHTML = h;
  var answered = {}, correct = 0;
  function finishCheck(){
    var n = Object.keys(answered).length;
    var el = document.getElementById("qscore");
    if(n === m.quiz.length){
      var pct = Math.round(100 * correct / m.quiz.length);
      var badge = pct >= 80 ? '<span class="scorebadge pass">PASSED ✓</span>' : '<span class="scorebadge fail">Below 80% — review &amp; retake</span>';
      el.innerHTML = 'Score: ' + correct + '/' + m.quiz.length + ' (' + pct + '%) ' + badge;
      if(pct > (store.quizBest[m.id] || 0)){ store.quizBest[m.id] = pct; save(); renderSidebar(); }
    } else {
      el.textContent = n + '/' + m.quiz.length + ' answered';
    }
  }
  body.querySelectorAll(".qq").forEach(function(qEl){
    var qi = +qEl.getAttribute("data-q");
    var q = m.quiz[qi];
    qEl.querySelectorAll(".opt").forEach(function(btn){
      btn.addEventListener("click", function(){
        if(answered[qi] !== undefined) return;
        var oi = +btn.getAttribute("data-o");
        answered[qi] = oi;
        if(oi === q.c){ btn.classList.add("sel-ok"); correct++; }
        else {
          btn.classList.add("sel-bad");
          qEl.querySelectorAll(".opt")[q.c].classList.add("reveal");
        }
        qEl.querySelector(".expl").classList.add("show");
        qEl.querySelectorAll(".opt").forEach(function(b){ b.disabled = true; });
        finishCheck();
      });
    });
  });
  document.getElementById("qreset").addEventListener("click", function(){ renderQuiz(m, body); mathify(body); });
  finishCheck();
}

/* ---------- drills ---------- */
function renderDrills(m, body){
  var got = store.drillsOk[m.id] || {};
  var h = '<div class="card"><p style="font-size:14px;color:var(--ink2);margin-bottom:18px;">Type your answer and press Check (or Enter). Formatting is forgiving — <code>3x^2</code>, <code>1/2</code>, <code>0.5</code>, <code>e^(-2)</code> all work where sensible. Stuck? Open the solution — reading worked solutions is studying, not cheating.</p>';
  m.drills.forEach(function(d, di){
    var okBefore = got[di];
    h += '<div class="drill" data-d="' + di + '"><div class="dq">' + (di+1) + '. ' + d.q + '</div>' +
      '<div class="drillrow"><input type="text" placeholder="your answer" ' + (okBefore ? 'value="✓ solved" disabled class="ok"' : '') + '>' +
      '<button class="btn small">Check</button><span class="dmark' + (okBefore ? ' ok' : '') + '">' + (okBefore ? "Solved ✓" : "") + '</span></div>' +
      (d.hint ? '<div class="hinttag">Hint: ' + d.hint + '</div>' : '') +
      '<details class="sol"><summary>Show solution</summary><div class="solbody">' + d.sol + '</div></details></div>';
  });
  h += '</div>';
  body.innerHTML = h;
  body.querySelectorAll(".drill").forEach(function(dEl){
    var di = +dEl.getAttribute("data-d");
    var d = m.drills[di];
    var input = dEl.querySelector("input");
    var mark = dEl.querySelector(".dmark");
    function doCheck(){
      if(input.disabled) return;
      var ok = checkAnswer(d, input.value);
      input.classList.remove("ok","bad");
      input.classList.add(ok ? "ok" : "bad");
      mark.className = "dmark " + (ok ? "ok" : "bad");
      mark.textContent = ok ? "Correct ✓" : "Not yet — try again";
      if(ok){
        if(!store.drillsOk[m.id]) store.drillsOk[m.id] = {};
        store.drillsOk[m.id][di] = true; save(); renderSidebar();
      }
    }
    dEl.querySelector("button").addEventListener("click", doCheck);
    input.addEventListener("keydown", function(e){ if(e.key === "Enter") doCheck(); });
  });
  var solDetails = body.querySelectorAll("details.sol");
  solDetails.forEach(function(det){
    det.addEventListener("toggle", function(){ if(det.open) mathify(det); });
  });
}

/* ================= boot ================= */
function boot(){ renderSidebar(); go("home"); }
if(document.readyState === "loading"){ document.addEventListener("DOMContentLoaded", boot); } else { boot(); }
</script>
